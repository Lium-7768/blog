<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      border-bottom: 1px solid #eee;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    
    nav a {
      color: #0066cc;
      text-decoration: none;
      margin-right: 20px;
    }
    
    nav a:hover {
      text-decoration: underline;
    }
    
    .post {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .post:hover {
      border-color: #0066cc;
    }
    
    .post h2 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }
    
    .post h2 a {
      color: #333;
      text-decoration: none;
    }
    
    .post h2 a:hover {
      color: #0066cc;
    }
    
    .post .date {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    
    .post .excerpt {
      color: #555;
      margin-bottom: 10px;
    }
    
    .tag {
      display: inline-block;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      margin-right: 5px;
    }
    
    footer {
      border-top: 1px solid #eee;
      padding-top: 20px;
      margin-top: 40px;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="/">Home</a>
      <a href="https://github.com/Lium-7768/blog" target="_blank">GitHub</a>
    </nav>
  </header>
  
  <main>
    <section style="margin-bottom: 40px;">
      <h2 style="margin-bottom: 15px;">Welcome</h2>
      <p style="color: #666;">A simple blog powered by GitHub Pages. More content coming soon!</p>
    </section>
    
    <section>
      <h2 style="margin-bottom: 15px;">Recent Posts</h2>
      
      <article class="post">
        <h2><a href="#">Hello World</a></h2>
        <p class="date">March 6, 2026</p>
        <p class="excerpt">Welcome to my new blog! This is the first post. More content will be added soon.</p>
        <div>
          <span class="tag">intro</span>
        </div>
      </article>
    </section>
  </main>
  
  <footer>
    <p>&copy; 2026 My Blog. Built with GitHub Pages.</p>
  </footer>
</body>
</html>
